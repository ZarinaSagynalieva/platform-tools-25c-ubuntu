# Installs the kube-prometheus-stack Helm chart (Prometheus + Grafana + Alertmanager)
# into the EKS cluster. Values live in eks-monitoring/values.yaml.
name: 'Workflow - Deploy EKS Monitoring (Prometheus & Grafana)'

on:
  # Manual run, with an optional pinned chart version.
  workflow_dispatch:
    inputs:
      chart_version:
        description: 'kube-prometheus-stack chart version (leave blank for latest)'
        required: false
        default: ''
  # Auto-deploy whenever the monitoring config or this workflow changes.
  push:
    branches:
      - feature/**
      - main
    paths:
      - 'eks-monitoring/**'
      - '.github/workflows/deploy-monitoring.yaml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "us-east-1"
  CLUSTER_NAME: "ubuntu-dev-cluster"
  MONITORING_NAMESPACE: "monitoring"
  HELM_RELEASE: "kube-prometheus-stack"

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    environment: dev

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.IAM_ROLE }}
          role-session-name: GitHubActionsRoleSession
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to EKS - update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER_NAME" --region "$AWS_REGION"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Add prometheus-community Helm repo
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Deploy kube-prometheus-stack
        env:
          CHART_VERSION: ${{ github.event.inputs.chart_version }}
        run: |
          helm upgrade --install "$HELM_RELEASE" prometheus-community/kube-prometheus-stack \
            --namespace "$MONITORING_NAMESPACE" --create-namespace \
            --values eks-monitoring/values.yaml \
            ${CHART_VERSION:+--version "$CHART_VERSION"} \
            --wait --timeout 15m

      - name: Show deployed resources
        run: |
          echo "=== Pods ==="
          kubectl -n "$MONITORING_NAMESPACE" get pods
          echo "=== Services ==="
          kubectl -n "$MONITORING_NAMESPACE" get svc
          echo ""
          echo "Grafana admin user: admin"
          echo "Retrieve the Grafana admin password with:"
          echo "  kubectl -n $MONITORING_NAMESPACE get secret ${HELM_RELEASE}-grafana -o jsonpath='{.data.admin-password}' | base64 -d ; echo"
