# Exposes Grafana through the shared internet-facing ALB Gateway (Gateway API).
#
# Mirrors the demo "hello" route design:
#   - This HTTPRoute lives in "monitoring" with Grafana's Service, so the
#     backendRef (kube-prometheus-stack-grafana:80) is SAME-namespace and needs
#     no ReferenceGrant.
#   - parentRef is the shared-gateway in gateway-system (cross-namespace),
#     permitted by that Gateway's listener allowedRoutes: from: All.
#
# Host-based routing at path "/" means Grafana is served at its root URL, so no
# grafana.ini sub-path configuration is required.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: shared-gateway
      namespace: gateway-system
  hostnames:
    - grafana.zarina.click 
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
